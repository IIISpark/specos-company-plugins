[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "your_temporal_module"
version = "0.1.0"
description = "Python Temporal worker module"
authors = [{ name = "Your Team" }]
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }

dependencies = [
    "pydantic>=2.12.0",
    "pyyaml>=6.0.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.6.0",
    "pyright>=1.1.0",
]
temporal = [
    "temporalio>=1.23.0,<2",
]

[project.scripts]
your-worker = "your_temporal_module.cli:main"

[tool.ruff]
line-length = 120
target-version = "py312"
indent-width = 4
fix = true

[tool.ruff.lint]
select = [
    "A",
    "E",
    "W",
    "F",
    "I",
    "B",
    "C4",
    "UP",
    "D",
    "N",
    "ARG",
    "ASYNC",
    "LOG",
    "G",
    "RET",
    "SIM",
    "PTH",
    "RUF",
]
ignore = [
    "D100",
    "D104",
    "D106",
    "D400",
    "D415",
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/**" = ["D101", "D102", "D103", "ARG001", "ARG002"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true

[tool.ruff.lint.pyupgrade]
keep-runtime-typing = true

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.ruff.lint.isort]
known-first-party = ["your_temporal_module"]

[tool.pyright]
include = ["src"]
exclude = ["tests", "**/node_modules"]
pythonVersion = "3.12"
pythonPlatform = "All"
useLibraryCodeForTypes = true
typeCheckingMode = "strict"
reportMissingImports = false
reportMissingTypeStubs = false
reportOptionalMemberAccess = true
reportOptionalSubscript = true
reportIncompatibleVariableOverride = true
reportUnusedVariable = true

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-ra -q --strict-markers --strict-config"

[tool.coverage.run]
source = ["src"]
omit = [
    "*/tests/*",
    "*/test_*",
    "*/__pycache__/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]
